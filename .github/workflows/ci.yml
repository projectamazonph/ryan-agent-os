name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pip check
      - run: ruff check .
      - run: mypy app
      - run: pytest
      - run: RAOS_DATABASE_URL=sqlite+aiosqlite:///./ci-migrations.db alembic upgrade head
      - run: RAOS_DATABASE_URL=sqlite+aiosqlite:///./ci-migrations.db alembic downgrade base
      - run: RAOS_DATABASE_URL=sqlite+aiosqlite:///./ci-migrations.db alembic upgrade head

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run lint:web
      - run: npm run typecheck:web
      - run: npm run test:web
      - run: npm run build:web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
